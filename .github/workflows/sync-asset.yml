# Receives asset updates from other repos (repository_dispatch) or manual run.
name: Sync asset to projects.json

on:
  repository_dispatch:
    types: [upsert-asset]
  workflow_dispatch:
    inputs:
      id:
        description: Unique id (usually repo name)
        required: true
      type:
        description: project or tool
        required: true
        type: choice
        options:
          - project
          - tool
      name:
        description: Display name
        required: true
      description:
        description: Short description
        required: true
      githubUrl:
        description: GitHub repository URL
        required: true
      tags:
        description: Comma-separated tags
        required: true
      problemSolved:
        description: Required when type is tool
        required: false
      updatedAt:
        description: ISO date YYYY-MM-DD (optional, default today)
        required: false

permissions:
  contents: write

concurrency:
  group: sync-asset
  cancel-in-progress: false

jobs:
  upsert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build payload (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAGS_JSON=$(echo "${{ inputs.tags }}" | tr ',' '\n' | jq -R . | jq -s .)
          PROBLEM='${{ inputs.problemSolved }}'
          if [ "${{ inputs.type }}" = "tool" ] && [ -z "$PROBLEM" ]; then
            echo "problemSolved is required for tool"
            exit 1
          fi
          jq -n \
            --arg id "${{ inputs.id }}" \
            --arg type "${{ inputs.type }}" \
            --arg name "${{ inputs.name }}" \
            --arg description "${{ inputs.description }}" \
            --arg githubUrl "${{ inputs.githubUrl }}" \
            --arg updatedAt "${{ inputs.updatedAt }}" \
            --arg problemSolved "$PROBLEM" \
            --argjson tags "$TAGS_JSON" \
            '{
              id: $id,
              type: $type,
              name: $name,
              description: $description,
              githubUrl: $githubUrl,
              tags: $tags,
              updatedAt: (if $updatedAt == "" then null else $updatedAt end),
              problemSolved: (if $problemSolved == "" then null else $problemSolved end)
            } | with_entries(select(.value != null))' > payload.json

      - name: Verify register key
        if: github.event_name == 'repository_dispatch'
        env:
          EXPECTED_KEY: ${{ secrets.PORTFOLIO_REGISTER_KEY }}
          PROVIDED_KEY: ${{ github.event.client_payload.registerKey }}
        run: |
          if [ -z "$EXPECTED_KEY" ]; then
            echo "::error::PORTFOLIO_REGISTER_KEY is not set on kingning2/xiaoman-projects. Add it in Settings → Secrets → Actions."
            exit 1
          fi
          if [ "$PROVIDED_KEY" != "$EXPECTED_KEY" ]; then
            echo "::error::Invalid or missing registerKey in client-payload."
            exit 1
          fi

      - name: Upsert projects.json (repository_dispatch)
        if: github.event_name == 'repository_dispatch'
        run: bun scripts/upsert-asset.ts '${{ toJSON(github.event.client_payload) }}'

      - name: Upsert projects.json (manual)
        if: github.event_name == 'workflow_dispatch'
        run: bun scripts/upsert-asset.ts "$(cat payload.json)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/projects.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(assets): update $(jq -r .id payload.json)"
          git push
