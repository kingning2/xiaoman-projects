# Copy to: YOUR_REPO/.github/workflows/register-to-portfolio.yml
#
# Secrets (Settings → Actions):
#   PORTFOLIO_PAT
#   PORTFOLIO_REGISTER_KEY
#
# Edit the ASSET_* constants in the script below for your project.

name: Register to portfolio

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
    branches: [main]

jobs:
  register:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Send asset to xiaoman-projects
        uses: actions/github-script@v7
        env:
          PORTFOLIO_REGISTER_KEY: ${{ secrets.PORTFOLIO_REGISTER_KEY }}
        with:
          github-token: ${{ secrets.PORTFOLIO_PAT }}
          script: |
            const wr = context.payload.workflow_run;
            const repo = wr.head_repository;

            // --- customize for your repo ---
            const ASSET_TYPE = "project"; // "project" | "tool"
            const ASSET_NAME = "Your project display name";
            const ASSET_DESCRIPTION = "One-line description for the portfolio card";
            const ASSET_TAGS = ["Next.js", "TypeScript"];
            const ASSET_PROBLEM_SOLVED = "Required when ASSET_TYPE is tool";
            // --- end customize ---

            const updatedRaw = wr.updated_at || new Date().toISOString();
            const updatedAt = String(updatedRaw).slice(0, 10);

            const payload = {
              registerKey: (process.env.PORTFOLIO_REGISTER_KEY || "").trim(),
              id: repo.name,
              type: ASSET_TYPE,
              name: ASSET_NAME,
              description: ASSET_DESCRIPTION,
              githubUrl: `https://github.com/${repo.full_name}`,
              tags: ASSET_TAGS,
              updatedAt,
            };

            if (ASSET_TYPE === "tool") {
              payload.problemSolved = ASSET_PROBLEM_SOLVED;
            }

            if (!payload.registerKey) {
              core.setFailed("PORTFOLIO_REGISTER_KEY secret is missing");
              return;
            }

            await github.rest.repos.createDispatchEvent({
              owner: "kingning2",
              repo: "xiaoman-projects",
              event_type: "upsert-asset",
              client_payload: payload,
            });
