# Copy to: YOUR_REPO/.github/workflows/register-to-portfolio.yml
#
# Required secrets in YOUR repo (Settings → Secrets → Actions):
#   PORTFOLIO_PAT          — ask kingning2/xiaoman-projects owner (never commit to git)
#   PORTFOLIO_REGISTER_KEY — same value as owner's portfolio repo secret
#
# Owner setup (xiaoman-projects repo only):
#   PORTFOLIO_REGISTER_KEY — random string you share privately with contributors

name: Register to portfolio

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
    branches: [main]

jobs:
  register:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Send asset to xiaoman-projects
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PORTFOLIO_PAT }}
          repository: kingning2/xiaoman-projects
          event-type: upsert-asset
          client-payload: |-
            {
              "registerKey": "${{ secrets.PORTFOLIO_REGISTER_KEY }}",
              "id": "${{ github.event.workflow_run.head_repository.name }}",
              "type": "project",
              "name": "Your project display name",
              "description": "One-line description shown on the portfolio card",
              "githubUrl": "https://github.com/${{ github.event.workflow_run.head_repository.full_name }}",
              "tags": ["Next.js", "TypeScript"],
              "updatedAt": "${{ github.event.workflow_run.updated_at }}"
            }

# Tool repo: "type": "tool" + "problemSolved": "..."
